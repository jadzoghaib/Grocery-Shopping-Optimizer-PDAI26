<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery Shopping Optimizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="stylesheet" href="/static/css/style.css?v=3">
</head>
<body>
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sb-logo">
      <svg viewBox="0 0 24 24" fill="none"><path d="M5 19C7 12 10 8 19 4c0 7-2.5 13-14 15z" fill="#fff" opacity=".9"/><path d="M5 19C7 14 11 11 19 4" stroke="rgba(0,0,0,.25)" stroke-width="1" stroke-linecap="round" fill="none"/></svg>
    </div>
    <a class="nav-item active" href="#/" data-page="dashboard" data-tip="Dashboard">
      <i class="fa-solid fa-house"></i><span class="nav-label">Home</span>
    </a>
    <a class="nav-item" href="#/planner" data-page="planner" data-tip="Meal Planner">
      <i class="fa-solid fa-utensils"></i><span class="nav-label">Planner</span>
    </a>
    <a class="nav-item" href="#/basket" data-page="basket" data-tip="Basket">
      <i class="fa-solid fa-basket-shopping"></i><span class="nav-label">Basket</span>
      <div class="nav-dot" id="basket-badge" style="display:none"></div>
    </a>
    <a class="nav-item" href="#/calendar" data-page="calendar" data-tip="Calendar">
      <i class="fa-solid fa-calendar-days"></i><span class="nav-label">Calendar</span>
    </a>
    <a class="nav-item" href="#/recipes" data-page="recipes" data-tip="Recipes">
      <i class="fa-solid fa-book-open"></i><span class="nav-label">Recipes</span>
    </a>
    <a class="nav-item" href="#/history" data-page="history" data-tip="History">
      <i class="fa-solid fa-clock-rotate-left"></i><span class="nav-label">History</span>
    </a>
    <a class="nav-item" href="#/fridge" data-page="fridge" data-tip="Fridge">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="4" y="2" width="16" height="20" rx="2.5" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M4 9h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M8 5.5v2M8 13v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span class="nav-label">Fridge</span>
    </a>
    <a class="nav-item" href="#/body" data-page="body" data-tip="Body Optimizer">
      <i class="fa-solid fa-dna"></i><span class="nav-label">Body</span>
    </a>
    <div class="sb-spacer"></div>
  </nav>

  <!-- Main content -->
  <main id="main">
    <header id="topbar">
      <span id="page-title">Dashboard</span>
      <div class="topbar-actions">
        <button class="topbar-btn" id="btn-settings" title="Plug in Groq API Key" style="background:var(--surface-alt,#f0f0f0);color:var(--text2,#444);border:1.5px solid var(--border,#ddd);font-size:.72rem;font-weight:700;gap:6px;padding:0 12px;height:34px;cursor:pointer">
          <i class="fa-solid fa-key"></i> Groq API
        </button>
        <button class="topbar-btn topbar-btn-primary" id="btn-chat-open"><i class="fa-solid fa-robot"></i> AI Assistant</button>
      </div>
    </header>
    <div id="content"></div>
  </main>

  <!-- Chat panel -->
  <aside id="chat-panel" class="hidden">
    <div class="chat-header">
      <h3><i class="fa-solid fa-robot"></i> AI Assistant</h3>
      <button id="btn-chat-close" class="btn-icon"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="chat-messages"></div>
    <div class="chat-input-area">
      <input type="text" id="chat-input" placeholder="Ask about recipes, products...">
      <button id="btn-chat-send"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </aside>

  <!-- Settings modal -->
  <div id="modal-overlay" class="hidden">
    <div class="modal" id="settings-modal">
      <div class="modal-header">
        <h3>Settings</h3>
        <button class="btn-icon modal-close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Groq API Key <span class="hint">(optional — leave empty to use server keys)</span></label>
          <input type="password" id="setting-groq-key" placeholder="gsk_... or leave blank">
          <div id="server-key-status" style="margin-top:6px;font-size:.75rem;color:var(--text3)"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" id="btn-save-settings">Save Settings</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script src="/static/js/app.js?v=5"></script>
</body>
</html>
