<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery Shopping Optimizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sb-brand">
      <div class="sb-brand-icon"><i class="fa-solid fa-leaf"></i></div>
      <div class="sb-brand-text">
        <span class="sb-script">Your Daily</span>
        <span class="sb-name">GroceryAI</span>
      </div>
    </div>
    <ul class="nav-links">
      <li><a href="#/" data-page="dashboard" class="active"><i class="fa-solid fa-house"></i><span>Dashboard</span></a></li>
      <li><a href="#/planner" data-page="planner"><i class="fa-solid fa-utensils"></i><span>Meal Planner</span></a></li>
      <li><a href="#/basket" data-page="basket"><i class="fa-solid fa-basket-shopping"></i><span>Basket</span><span class="nav-badge" id="basket-badge" style="display:none">0</span></a></li>
      <li><a href="#/calendar" data-page="calendar"><i class="fa-solid fa-calendar-days"></i><span>Calendar</span></a></li>
      <li><a href="#/recipes" data-page="recipes"><i class="fa-solid fa-book-open"></i><span>Recipes</span></a></li>
      <li><a href="#/history" data-page="history"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></a></li>
      <li><a href="#/fridge" data-page="fridge"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="flex-shrink:0" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="2" width="16" height="20" rx="2.5" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M4 9h16" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M8 5.5v2M8 13v4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>Fridge</span></a></li>
      <li><a href="#/body" data-page="body"><i class="fa-solid fa-dna"></i><span>Body Optimizer</span></a></li>
    </ul>
    <div class="sb-footer">
      <button id="btn-settings" class="icon-btn" title="Settings"><i class="fa-solid fa-gear"></i></button>
      <button id="btn-chat-toggle" class="icon-btn" title="AI Assistant"><i class="fa-solid fa-robot"></i></button>
      <button class="icon-btn" title="Toggle theme"><i class="fa-solid fa-moon"></i></button>
    </div>
  </nav>

  <!-- Main content -->
  <main id="main">
    <header id="topbar">
      <button id="btn-menu" class="icon-btn mobile-only"><i class="fa-solid fa-bars"></i></button>
      <h1 id="page-title">Dashboard</h1>
      <div class="topbar-right">
        <div class="topbar-search"><i class="fa-solid fa-magnifying-glass"></i> Search products…</div>
        <button id="btn-chat-open" class="ai-btn"><i class="fa-solid fa-robot"></i> AI Assistant</button>
        <div class="avatar" title="Profile">JD</div>
      </div>
    </header>
    <div id="content"></div>
  </main>

  <!-- Chat panel -->
  <aside id="chat-panel" class="hidden">
    <div class="chat-header">
      <h3><i class="fa-solid fa-robot"></i> AI Assistant</h3>
      <button id="btn-chat-close" class="btn-icon"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="chat-messages"></div>
    <div class="chat-input-area">
      <input type="text" id="chat-input" placeholder="Ask about recipes, products...">
      <button id="btn-chat-send"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </aside>

  <!-- Settings modal -->
  <div id="modal-overlay" class="hidden">
    <div class="modal" id="settings-modal">
      <div class="modal-header">
        <h3>Settings</h3>
        <button class="btn-icon modal-close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Groq API Key <span class="hint">(used for shopping list generation and chat)</span></label>
          <input type="password" id="setting-groq-key" placeholder="gsk_...">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" id="btn-save-settings">Save Settings</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script src="/static/js/app.js"></script>
</body>
</html>
